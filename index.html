<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="limit-content">
    <header class="header">
        <h1>Simple Library</h1>
        <button class="add">Add book</button>
    </header>
    <main class="card-container">
        <div class="card">
            <h2 class="bookTitle">Harry Potter</h2>
            <ul class="bookDetails">
                <li class="author">Author: J.K. Rowling</li>
                <li class="pages">Pages: 250</li>
                <li class="readStatus">Read status: Read</li>
            </ul>
        </div>
        <div class="card">
            <h2 class="bookTitle">Start with Why</h2>
            <ul class="bookDetails">
                <li class="author">Author: Simon Sinek</li>
                <li class="pages">Pages: 375</li>
                <li class="readStatus">Read status: Read</li>
            </ul>
        </div>
        <div class="card">
            <h2 class="bookTitle">Atomic Habits</h2>
            <ul class="bookDetails">
                <li class="author">Author: James Clear</li>
                <li class="pages">Pages: 348</li>
                <li class="readStatus">Read status:Not read</li>
            </ul>
        </div>
    </main>
    <footer class="footer">
        <p>Made by <a href="https://github.com/diego2go">diego2go</a></p>
    </footer>
</body>
</html>
