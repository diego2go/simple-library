<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
</head>
<body class="limit-content">
    <header class="header">
        <h1>Simple Library</h1>
        <button class="button" command="show-modal" commandfor="add-book-dialog">New Book</button>
        <dialog id="add-book-dialog">
            <div class="row">
                <h2 class="bookTitle row">New Book</h2>
                <button commandfor="add-book-dialog" command="close" class="button row">Close</button>
            </div>
            <form class="add-book form-inputs" action="" method="dialog" >
                <div class="row">
                    <label for="book-title" class="dialog-label">Title</label>
                    <input  clas="input-box" type="text" name="book-title" id="book-title" placeholder="48 Laws of Power" required>
                </div>
                <div class="row">
                    <label for="book-author" class="dialog-label">Author</label>
                    <input clas="input-box" type="text" name="book-author" id="book-author" placeholder="Robert Greene" required>
                </div>
                <div class="row">
                    <label for="book-pages" class="dialog-label">Pages</label>
                    <input clas="input-box" type="number" name="book-pages" id="book-pages" placeholder="378" required>
                </div>
                <div class="row">
                    <label class="dialog-label">Read?</label>
                    <div class="row">
                        <label for="book-read">Yes</label>
                        <input type="radio" name="book-read" id="read" value="true">
                    </div>
                    <div class="row">
                        <label for="book-not-read">No</label>
                        <input type="radio" name="book-not-read" id="not-read" value="false">
                    </div>
                </div>
                <input type="submit" class="button" id="save-button" value="Save">
            </form> 
        </dialog>
    </header>
    <main class="card-container">
        <div class="card">
            <h2 class="bookTitle">Harry Potter</h2>
            <ul class="bookDetails">
                <li class="author">Author: J.K. Rowling</li>
                <li class="pages">Pages: 250</li>
                <li class="readStatus">Read status: Read</li>
            </ul>
        </div>
        <div class="card">
            <h2 class="bookTitle">Start with Why</h2>
            <ul class="bookDetails">
                <li class="author">Author: Simon Sinek</li>
                <li class="pages">Pages: 375</li>
                <li class="readStatus">Read status: Read</li>
            </ul>
        </div>
        <div class="card">
            <h2 class="bookTitle">Atomic Habits</h2>
            <ul class="bookDetails">
                <li class="author">Author: James Clear</li>
                <li class="pages">Pages: 348</li>
                <li class="readStatus">Read status:Not read</li>
            </ul>
        </div>
    </main>
    <footer class="footer">
        <p>Made by <a href="https://github.com/diego2go">diego2go</a></p>
    </footer>
</body>
</html>
